<section class="hero">
  <div class="hero-image-side">
    <div class="hero-image-placeholder" aria-hidden="true">
      <!-- PLACEHOLDER imagen hero -->
    </div>

    <div class="hero-content">
      <p class="hero-category">{{ data().category }}</p>
      <h1 class="hero-title">{{ data().title }}</h1>

      <ul class="hero-vehicles" aria-label="Sectores: Automoción, Moto, Náutica y Caravaning">
        <li class="vehicle-icon" aria-label="Automoción">
          <!-- PLACEHOLDER icono coche -->
          <span class="icon-placeholder">[coche]</span>
        </li>
        <li class="vehicle-icon" aria-label="Moto">
          <!-- PLACEHOLDER icono moto -->
          <span class="icon-placeholder">[moto]</span>
        </li>
        <li class="vehicle-icon" aria-label="Náutica">
          <!-- PLACEHOLDER icono barco -->
          <span class="icon-placeholder">[barco]</span>
        </li>
        <li class="vehicle-icon" aria-label="Caravaning">
          <!-- PLACEHOLDER icono caravana -->
          <span class="icon-placeholder">[caravana]</span>
        </li>
      </ul>

      <a [href]="data().ctaUrl" class="hero-cta" [attr.aria-label]="data().ctaText">
        {{ data().ctaText }}
      </a>
    </div>
  </div>

  <aside class="hero-login">
    <div class="login-header">
      <h2 class="login-title">{{ data().loginTitle }}</h2>
      <div class="login-logo-placeholder" aria-hidden="true">
        <!-- PLACEHOLDER logo Crédito Click -->
        <span class="icon-placeholder">[logo Crédito Click]</span>
      </div>
    </div>

    <form class="login-form" (submit)="$event.preventDefault(); onSubmit()" novalidate>
      <label class="visually-hidden" for="conc-username">{{ data().userPlaceholder }}</label>
      <input
        id="conc-username"
        type="text"
        class="login-input"
        [placeholder]="data().userPlaceholder"
        [value]="username()"
        (input)="username.set($any($event.target).value)"
        autocomplete="username"
      />

      <label class="visually-hidden" for="conc-password">{{ data().passwordPlaceholder }}</label>
      <input
        id="conc-password"
        type="password"
        class="login-input"
        [placeholder]="data().passwordPlaceholder"
        [value]="password()"
        (input)="password.set($any($event.target).value)"
        autocomplete="current-password"
      />

      <button type="submit" class="login-button">{{ data().loginButton }}</button>
    </form>
  </aside>
</section>
